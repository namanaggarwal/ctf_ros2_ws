session_name: ctf_rover
windows:
  - window_name: mighty
    layout: tiled
    shell_command_before:
      - source /opt/ros/humble/setup.bash
      - source /home/swarm/.bashrc
    panes:
      # Onboard mighty
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - source /home/swarm/code/decomp_ws/install/setup.bash
        - ros2 launch mighty onboard_mighty.launch.py x:=0.0 y:=0.0 z:=0.0 yaw:=0.0 namespace:=$ROVER_NAME use_hardware:=true use_obstacle_tracker:=false use_onboard_localization:=true robot_type:=red_rover depth_camera_name:=d455

      # Livox
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 launch livox_ros_driver2 run_MID360_launch.py namespace:=$ROVER_NAME

      # DLIO
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 launch direct_lidar_inertial_odometry dlio.launch.py namespace:=$ROVER_NAME

      # Republish rviz 2D goal to term goal
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 run mighty repub_rviz_2Dgoal.py

      # Static TF
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 run tf2_ros static_transform_publisher 0 0 0 0 0.3490659 0 $ROVER_NAME/base_link $ROVER_NAME/lidar

      # Global Mapper
      - shell_command:
        - source /home/swarm/code/mighty_ws/install/setup.bash
        - ros2 launch global_mapper_ros global_mapper_node.launch.py hardware:=true quad:="$ROVER_NAME" depth_pointcloud_topic:="livox/lidar" pose_topic:="dlio/odom_node/pose" # odom_topic:="dlio/odom_node/odom"
  
  - window_name: ctf
    layout: tiled
    shell_command_before:
      - source /opt/ros/humble/setup.bash
      - source /home/swarm/.bashrc
    panes:
      # CTF rover node — set PARAMS_FILE to the correct role yaml before launching.
      # Examples (adjust rover names to match VEHTYPE+VEHNUM on each machine):
      #   Blue_0: params_blue_0.yaml
      #   Blue_1: params_blue_1.yaml
      #   Red_0:  params_red_0.yaml
      #   Red_1:  params_red_1.yaml
      - shell_command:
        - source /home/swarm/code/ctf_ros2_ws/install/setup.bash
        - export PARAMS_FILE=$(ros2 pkg prefix ctf_rover)/share/ctf_rover/config/params_blue_0.yaml
        - sleep 5; ros2 run ctf_rover rover_node --ros-args --params-file $PARAMS_FILE